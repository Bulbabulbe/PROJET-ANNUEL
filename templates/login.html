<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SharCode — Connexion</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <span style="font-size:2rem">🦈</span>
      <span style="font-size:1.5rem;font-weight:700;color:var(--shark-light)">SharCode</span>
    </div>
    <h1 class="auth-title">Connexion</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form class="auth-form" method="POST" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" name="email" required autofocus
               placeholder="toi@ecole.fr" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="mot_de_passe">Mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="mot_de_passe" name="mot_de_passe" required
                 placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="eye-toggle" onclick="toggleMdp(this)" title="Afficher/masquer">
            <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-close" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-run btn-full">Se connecter</button>
    </form>

    <p class="auth-switch" style="margin-top:1.5rem;font-size:0.82rem;color:#445577">
      Ton compte est créé par ton établissement.
    </p>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
