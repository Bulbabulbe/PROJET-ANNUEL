worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Le service Flask/Gunicorn, joignable via le réseau interne Docker
    upstream sharcode_app {
        server web:5000;
    }

    server {
        listen      80;
        server_name _;

        # Fichiers statiques servis directement par nginx (plus rapide)
        location /static/ {
            alias /app/static/;
            expires 7d;
            access_log off;
        }

        # Tout le reste est transmis à l'application
        location / {
            proxy_pass http://sharcode_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
